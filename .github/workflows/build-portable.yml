name: Build Portable

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build portable
        run: npx tauri build --no-bundle --features portable

      - name: Package portable
        shell: pwsh
        run: |
          $out = "artifacts/portable"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "src-tauri/target/release/tiez-app.exe" -Destination "$out/tiez-app.exe"
          Compress-Archive -Path "$out/tiez-app.exe" -DestinationPath "$out/TieZ-Portable.zip" -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TieZ Portable ${{ github.ref_name }}
          files: artifacts/portable/TieZ-Portable.zip
